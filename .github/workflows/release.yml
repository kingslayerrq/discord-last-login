name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version without the v prefix, for example 1.4.2
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve version
        id: version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$REQUESTED_VERSION" ]; then
            VERSION="$REQUESTED_VERSION"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate requested version
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "package.json is $PACKAGE_VERSION, requested $VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Create tag for manual release
        if: github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          gh release create "v$VERSION" dist/LastSeen.plugin.js \
            --title "LastSeen v$VERSION" \
            --generate-notes \
            --latest
