name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version without the v prefix, for example 1.4.2
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate requested version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$PACKAGE_VERSION" != "${{ inputs.version }}" ]; then
            echo "package.json is $PACKAGE_VERSION, requested ${{ inputs.version }}"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          git tag "v$VERSION"
          git push origin "v$VERSION"
          gh release create "v$VERSION" dist/LastSeen.plugin.js \
            --title "LastSeen v$VERSION" \
            --generate-notes \
            --latest
